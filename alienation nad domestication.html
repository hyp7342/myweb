      if (level === 1) return { bg: 'bg-amber-900', text: 'text-amber-300', border: 'border-amber-500', glow: 'shadow-amber-500/30', solid: '#f59e0b' };
      if (level === 2) return { bg: 'bg-violet-900', text: 'text-violet-300', border: 'border-violet-500', glow: 'shadow-violet-500/30', solid: '#8b5cf6' };
      if (level === 3) return { bg: 'bg-indigo-900', text: 'text-indigo-300', border: 'border-indigo-500', glow: 'shadow-indigo-500/30', solid: '#6366f1' };
      return { bg: 'bg-cyan-950', text: 'text-cyan-300', border: 'border-cyan-400', glow: 'shadow-cyan-400/30', solid: '#22d3ee' };
    }

                </div>
              ))}
            </div>
            {/* Thumb */}
            <input type="range" min="0" max="4" value={level}
              onChange={e => onLevelChange(Number(e.target.value))}
              className="absolute top-0 left-0 w-full h-3 opacity-0 cursor-pointer z-20"
              style={{ margin: 0 }} />
            <div
              className="absolute top-1/2 -translate-y-1/2 w-7 h-7 rounded-full z-10 pointer-events-none"
              style={{ left: `calc(${level * 25}% - 14px)`,
                background: `linear-gradient(135deg, ${getGradientColor(level).solid}, ${getGradientColor(Math.min(4, level + 1)).solid})`,
                boxShadow: `0 0 20px ${getGradientColor(level).solid}66` }}>
              <div className="absolute inset-0 rounded-full ring-2 ring-white/30 ring-inset" />
              <Icon d={Icons.slidersHorizontal} size={14} className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-white drop-shadow" />
            </div>
          </div>
          <div className="flex justify-between gap-1.5 mt-6">
            {[0,1,2,3,4].map(i => (
              <button key={i} onClick={() => onLevelChange(i)}
                className={`flex-1 py-1.5 rounded-md text-xs font-mono font-medium transition-all ${i === level ? 'bg-slate-100 text-slate-950 shadow-lg' : 'bg-slate-800/50 text-slate-400 hover:text-slate-200 hover:bg-slate-700/50 border border-slate-700/30'}`}>
                L{i+1}
              </button>
            ))}
          </div>
        </div>
      );
    }

    function MainDisplay({ term, level }) {
      const currentData = term.levels[level];
      const colors = getGradientColor(level);

      return (
        <div className="px-4 sm:px-6 pb-4 animate-[fadeIn_0.35s_ease-out]">
          <div className="text-center mb-5">
            <div className="inline-flex items-baseline gap-2 mb-1">
              <span className="text-2xl sm:text-3xl font-black gradient-text font-mono">{term.chinese}</span>
              <span className="text-sm text-slate-500 font-mono">{term.pinyin}</span>
            </div>
            <span className="inline-block px-2.5 py-0.5 rounded-full text-[11px] font-medium bg-slate-800 text-slate-400 border border-slate-700">{term.category}</span>
          </div>
          <div className={`relative rounded-xl ${colors.bg} border-2 ${colors.border} p-6 sm:p-8 text-center shadow-xl ${colors.glow}`}>
            <p className="text-xs font-mono uppercase tracking-widest text-slate-400 mb-2">English Translation</p>
            <h2 className={`text-xl sm:text-2xl md:text-3xl font-extrabold ${colors.text} leading-snug font-mono break-words`}> "{currentData.english}"</h2>
            <div className="mt-3 flex items-center justify-center gap-2">
              <Icon d={Icons.scale} size={16} className="text-slate-500" />
              <span className="text-sm font-mono font-semibold text-slate-300">{currentData.strategyName}</span>
            </div>
            <div className="absolute top-2 left-2 w-6 h-6 border-t-2 border-l-2 border-white/10 rounded-tl-lg" />
            <div className="absolute bottom-2 right-2 w-6 h-6 border-b-2 border-r-2 border-white/10 rounded-br-lg" />
          </div>
        </div>
      );
    }

    function SidebarTheory({ term, level }) {
      const currentData = term.levels[level];
      return (
        <aside className="px-4 sm:px-6 py-4 border-t lg:border-t-0 lg:border-l border-slate-800 bg-slate-950/50">
          <div className="flex items-center gap-2 mb-4">
            <Icon d={Icons.bookOpen} size={16} className="text-violet-400" />
            <h3 className="text-sm font-bold text-slate-200 uppercase tracking-wider">Venuti 理论要点</h3>
          </div>
          <div className="space-y-2">
            {currentData.venutiPoints.map((point, idx) => (
              <div key={idx} className="animate-[slideIn_0.25s_ease-out_both]" style={{ animationDelay: `${idx * 60}ms`, opacity: 0, transform: 'translateX(12px)' }}
                style={{ animation: `fadeInLeft 0.25s ease-out ${idx * 0.06}s both` }}>
                <div className="flex items-start gap-2.5 p-2.5 rounded-lg hover:bg-slate-800/80 transition-colors">
                  <span className="flex-shrink-0 w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-mono font-bold mt-0.5 bg-violet-500/20 text-violet-300">{idx + 1}</span>
                  <p className="text-xs leading-relaxed text-slate-400">{point}</p>
                </div>
              </div>
            ))}
          </div>
          <div className="mt-5 p-3.5 rounded-lg bg-cyan-950/20 border border-cyan-900/30">
            <div className="flex items-center gap-2 mb-2">
              <Icon d={Icons.target} size={14} className="text-cyan-400" />
              <h4 className="text-xs font-bold text-cyan-300 uppercase tracking-wider">适用语境</h4>
            </div>
            <p className="text-xs text-slate-400 leading-relaxed">{currentData.contextUsage}</p>
          </div>
        </aside>
      );
    }

    function ProsConsPanel({ term, level }) {
      const currentData = term.levels[level];
      return (
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 px-4 sm:px-6 py-4">
          <div className="rounded-lg bg-emerald-950/20 border border-emerald-900/30 p-4">
            <div className="flex items-center gap-2 mb-3">
              <Icon d={Icons.trendingUp} size={16} className="text-emerald-400" />
              <h4 className="text-xs font-bold text-emerald-300 uppercase tracking-wider">优势</h4>
            </div>
            <ul className="space-y-1.5">
              {currentData.pros.map((pro, i) => (
                <li key={i} className="flex items-start gap-2 text-xs text-slate-400"><span className="text-emerald-500 mt-0.5">▸</span>{pro}</li>
              ))}
            </ul>
          </div>
          <div className="rounded-lg bg-red-950/20 border border-red-900/30 p-4">
            <div className="flex items-center gap-2 mb-3">
              <Icon d={Icons.arrowRight} size={16} className="text-red-400 rotate-[-45deg]" />
              <h4 className="text-xs font-bold text-red-300 uppercase tracking-wider">局限</h4>
            </div>
            <ul className="space-y-1.5">
              {currentData.cons.map((con, i) => (
                <li key={i} className="flex items-start gap-2 text-xs text-slate-400"><span className="text-red-500 mt-0.5">▸</span>{con}</li>
              ))}
            </ul>
          </div>
        </div>
      );
    }

    function BottomConclusion({ term, level }) {
      return (
        <footer className="px-4 sm:px-6 py-5 border-t border-slate-800 bg-slate-950/80">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div className="rounded-lg bg-yellow-950/20 border border-yellow-900/30 p-4">
              <div className="flex items-center gap-2 mb-2">
                <Icon d={Icons.lightbulb} size={16} className="text-yellow-400" />
                <h4 className="text-xs font-bold uppercase tracking-wider text-slate-300">教学启示</h4>
              </div>
              <p className="text-xs text-slate-400 leading-relaxed">
                翻译策略的选择并非二元对立，而是一个连续光谱。"{term.chinese}"的{term.levels.length}种译法展示了同一文化专有项在不同归化—异化程度下的多样可能性。教学中应引导学生根据目的语读者、文本类型和翻译目的灵活选取定位。
              </p>
            </div>
            <div className="rounded-lg bg-violet-950/20 border border-violet-900/30 p-4">
              <div className="flex items-center gap-2 mb-2">
                <Icon d={Icons.scale} size={16} className="text-violet-400" />
                <h4 className="text-xs font-bold uppercase tracking-wider text-slate-300">Venuti 核心观点</h4>
              </div>
              <p className="text-xs text-slate-400 leading-relaxed">
                Lawrence Venuti 在《译者的隐身》(1995) 中提出：归化翻译往往掩盖翻译行为，使译文读起来像原文；而异化翻译则刻意保留源语的"陌生感"，迫使读者面对文化差异。两者各有其政治性与伦理含义，译者应在具体情境中做出自觉的策略选择。
              </p>
            </div>
          </div>
          <div className="mt-4 pt-3 border-t border-slate-800/50 text-center">
            <p className="text-[10px] text-slate-600 font-mono">外国语大学翻译学院 · 翻译理论与实务课件 · Based on Venuti (1995) The Translator's Invisibility</p>
          </div>
        </footer>
      );
    }

    // ─── Main App Component ──────────────────────────────────────────
    function App() {
      const [selectedTermId, setSelectedTermId] = useState('jianghu');
      const [sliderLevel, setSliderLevel] = useState(2);

      const currentTerm = useMemo(() => DEFAULT_TERMS.find(t => t.id === selectedTermId) || DEFAULT_TERMS[0], [selectedTermId]);

      const handleTermChange = useCallback((id) => { setSelectedTermId(id); setSliderLevel(2); }, []);

      return (
        <div className="min-h-screen bg-slate-950 text-slate-200 font-sans antialiased selection:bg-violet-500/30">
          <Toolbar selectedTermId={selectedTermId} onTermChange={handleTermChange} terms={DEFAULT_TERMS} />
          <main className="flex flex-col lg:flex-row">
            <section className="flex-1 min-w-0">
              <SpectrumSlider level={sliderLevel} onLevelChange={setSliderLevel} />
              <MainDisplay term={currentTerm} level={sliderLevel} />
              <ProsConsPanel term={currentTerm} level={sliderLevel} />
              <BottomConclusion term={currentTerm} level={sliderLevel} />
            </section>
            <div className="w-full lg:w-[380px] xl:w-[420px] flex-shrink-0">
              <SidebarTheory term={currentTerm} level={sliderLevel} />
            </div>
          </main>
        </div>
      );
    }

    // Add CSS animations
    const styleSheet = document.createElement("style");
    styleSheet.textContent = `
      @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes fadeInLeft { from { opacity: 0; transform: translateX(12px); } to { opacity: 1; transform: translateX(0); } }
      input[type=range]::-webkit-slider-thumb { appearance: none; width: 28px; height: 28px; border-radius: 50%; cursor: grab; border: none; }
      input[type=range]:active::-webkit-slider-thumb { cursor: grabbing; }
    `;
    document.head.appendChild(styleSheet);

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
